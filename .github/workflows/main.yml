name: CI Build and Deploy via GitOps

on:
  push:
    branches:
      - master              # Run automatically when code is pushed to master
    paths-ignore:
            - 'manifest/**' # ignore changes to manifest files to prevent loop
  workflow_dispatch:        # Allow manual execution from the GitHub Actions UI

permissions:
  contents: write           # Required for pushing manifest updates to the GitOps repo

# Prevent overlapping runs on the same branch
concurrency:
  group: demo-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # JOB 1: BUILD
  # This job performs CI tasks:
  # - checkout source code
  # - set up Python
  # - install dependencies
  # - lint and test the code
  # - run SonarQube scan
  # - build Docker image
  # - scan image with Trivy
  # - push Docker image to Docker Hub
  #
  # At the end, it exposes image metadata (tag/version) so the
  # deploy job can reuse it safely.
  # ============================================================
  build:
    name: Build, Scan and Push Image
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/demo-app
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}

    # These outputs are passed to the deploy job
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      # Step 1: Download application source code from the current repo
      - name: Checkout application repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Full git history helps SonarQube analyze branches properly

      # Step 2: Install Python runtime needed for the app and test tools
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'      # Speeds up dependency installs using pip cache

      # Step 3: Prepare Docker Buildx for Docker builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Install project dependencies and developer tooling
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov

      # Step 5: Run linting to catch code-style and simple quality issues
      - name: Run lint checks
        shell: bash
        run: |
          set -euo pipefail
          flake8 --ignore=E501,F401 .

      # Step 6: Run unit tests if test files exist
      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          if find . -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            pytest -q
          else
            echo "No test files found, skipping unit tests for now."
          fi

      # Step 7: Log in to Docker Hub so this runner can push images
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 8: Generate image tags and expose them to later steps and next job
      # - name: Create image tags
      #   id: meta
      #   shell: bash
      #   run: |
      #     set -euo pipefail

      #     SHORT_SHA="${GITHUB_SHA::7}"
      #     VERSION="v${SHORT_SHA}-${GITHUB_RUN_NUMBER}"
      #     IMAGE_VERSION="${IMAGE_NAME}:${VERSION}"
      #     IMAGE_LATEST="${IMAGE_NAME}:latest"

      #     echo "VERSION=$VERSION" >> "$GITHUB_ENV"
      #     echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"
      #     echo "IMAGE_VERSION=$IMAGE_VERSION" >> "$GITHUB_ENV"
      #     echo "IMAGE_LATEST=$IMAGE_LATEST" >> "$GITHUB_ENV"

      #     # Only pass the non-secret value to the next job
      #     echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      #     echo "DEBUG version=$VERSION"
      #     echo "DEBUG image_version=$IMAGE_VERSION"
      #     echo "DEBUG image_latest=$IMAGE_LATEST"

      - name: Create image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          # Format: MMDD-HHMM (UTC time)
          SHORT_SHA="${GITHUB_SHA::4}"
          VERSION="$(date -u +'%m%d%H%M')-${SHORT_SHA}"

          IMAGE_VERSION="${IMAGE_NAME}:${VERSION}"
          IMAGE_LATEST="${IMAGE_NAME}:latest"

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "IMAGE_VERSION=$IMAGE_VERSION" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST=$IMAGE_LATEST" >> "$GITHUB_ENV"

          # Only pass version to next job
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          echo "DEBUG version=$VERSION"
          echo "DEBUG image_version=$IMAGE_VERSION"

      # Step 9: Run SonarQube code analysis
      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.sources=.
            -Dsonar.python.version=3.9
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.qualitygate.wait=false
            -Dsonar.qualitygate.timeout=300

      # Step 10: Build Docker image with both versioned and latest tags
      - name: Build Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker build . \
            -t "${IMAGE_VERSION}" \
            -t "${IMAGE_LATEST}"

      # Step 11: Scan the built image for HIGH and CRITICAL vulnerabilities
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_VERSION }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      # Step 12: Push immutable versioned image to Docker Hub
      - name: Push versioned Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker push "${IMAGE_VERSION}"

      # Step 13: Push latest image tag for convenience
      - name: Push latest Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker push "${IMAGE_LATEST}"

  # ============================================================
  # JOB 2: DEPLOY
  # This job performs CD-related GitOps tasks:
  # - checks out the GitOps repo that ArgoCD watches
  # - updates the Kubernetes manifest with the new image tag
  # - commits and pushes the change
  #
  # ArgoCD then detects the GitOps repo update and deploys it.
  # ============================================================
  deploy:
    name: Update GitOps Repo
    runs-on: ubuntu-latest
    needs: build            # This job only runs if the build job succeeds

    env:
      GITOPS_REPO: ${{ vars.ARGOCD_REPO }}
      GITOPS_BRANCH: ${{ vars.ARGOCD_BRANCH }}
      GITOPS_MANIFEST_PATH: ${{ vars.ARGOCD_MANIFEST_PATH }}
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/demo-app

      # Pull values from the build job outputs
      VERSION: ${{ needs.build.outputs.version }}
      IMAGE_VERSION: ${{ secrets.DOCKER_USERNAME }}/demo-app:${{ needs.build.outputs.version }}
      IMAGE_LATEST: ${{ secrets.DOCKER_USERNAME }}/demo-app:latest

    steps:
      # Step 14: Show received values from the build job for debugging
      - name: Debug received image metadata
        shell: bash
        run: |
          set -euo pipefail
          echo "VERSION=${VERSION}"
          echo "IMAGE_VERSION=${IMAGE_VERSION}"
          echo "IMAGE_LATEST=${IMAGE_LATEST}"

      # Step 15: Checkout the GitOps repository that ArgoCD monitors
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          ref: ${{ env.GITOPS_BRANCH }}
          token: ${{ secrets.ARGOCD_REPO_TOKEN }}
          path: gitops
      - name: Install kubectl
        run: |
          curl -O https://s3.us-west-2.amazonaws.com/amazon-eks/1.30.7/2024-12-12/bin/linux/amd64/kubectl
          chmod +x ./kubectl
          sudo mv ./kubectl /usr/local/bin/kubectl

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/argocd

      - name: Log in to ArgoCD
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --username ${{ secrets.ARGOCD_USERNAME }} \
            --password ${{ secrets.ARGOCD_PASSWORD }} \
            --insecure

      # Step 16: Confirm the manifest file exists before modifying it
      - name: Validate GitOps manifest path exists
        shell: bash
        run: |
          set -euo pipefail
          test -f "gitops/${GITOPS_MANIFEST_PATH}"

      # Step 17: Show the current image value in the manifest before updating
      - name: Show current image in GitOps manifest
        shell: bash
        run: |
          set -euo pipefail
          grep "image:" "gitops/${GITOPS_MANIFEST_PATH}"

      # Step 18: Update the Kubernetes manifest with the new Docker image tag
      - name: Update GitOps manifest image tag
        shell: bash
        run: |
          set -euo pipefail

          # Stop immediately if IMAGE_VERSION is empty
          if [ -z "${IMAGE_VERSION}" ]; then
            echo "ERROR: IMAGE_VERSION is empty. Aborting update."
            exit 1
          fi

          # Replace the image line in the manifest with the new image tag
          sed -i "s|image: .*|image: ${IMAGE_VERSION}|g" \
            "gitops/${GITOPS_MANIFEST_PATH}"

          echo "Updated manifest:"
          grep "image:" "gitops/${GITOPS_MANIFEST_PATH}"

      # Step 19: Commit the manifest change to the GitOps repository
      - name: Commit GitOps manifest change
        shell: bash
        run: |
          set -euo pipefail
          cd gitops

          # Configure git identity for the workflow bot
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${GITOPS_MANIFEST_PATH}"

          # Exit successfully if there is nothing new to commit
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "Update demo-app image tag to ${VERSION}"

      # Step 20: Push the updated manifest so ArgoCD can deploy it
      - name: Push GitOps manifest change
        shell: bash
        run: |
          set -euo pipefail
          cd gitops
          git push origin "${GITOPS_BRANCH}"

      - name: Refresh ArgoCD App and Sync
        run: argocd app sync demo-app
