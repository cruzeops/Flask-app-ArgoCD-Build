name: CI Build and Deploy via GitOps

on:
  push:
    branches:
      - master              # Trigger pipeline when code is pushed to master
  workflow_dispatch:        # Allow manual trigger from GitHub UI

permissions:
  contents: write           # Needed to push changes to GitOps repo

# Prevent multiple runs from conflicting when pushing rapidly
concurrency:
  group: demo-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest  # GitHub-hosted runner for CI tasks

    # Values used only by the build job
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/demo-app
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}

    # Expose generated image metadata so the deploy job can reuse it
    outputs:
      version: ${{ steps.meta.outputs.version }}
      image_version: ${{ steps.meta.outputs.image_version }}

    steps:

      # Step 1: Checkout application source code
      - name: Checkout application repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Full history needed for SonarQube analysis

      # Step 2: Set up Python runtime environment
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'      # Enables pip dependency caching for faster builds

      # Step 3: Enable Docker Buildx for Docker image builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Install application and test dependencies
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov

      # Step 5: Run linting to catch basic code quality issues
      - name: Run lint checks
        shell: bash
        run: |
          set -euo pipefail
          flake8 --ignore=E501,F401 .

      # Step 6: Run unit tests before building the image
      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          if find . -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            pytest -q
          else
            echo "No test files found, skipping unit tests for now."
          fi

      # Step 7: Authenticate to Docker Hub so the runner can push images
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 8: Generate the versioned and latest image tags for this run
      - name: Create image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="v${SHORT_SHA}-${GITHUB_RUN_NUMBER}"

          IMAGE_NAME="${{ env.IMAGE_NAME }}"
          IMAGE_VERSION="${IMAGE_NAME}:${VERSION}"
          IMAGE_LATEST="${IMAGE_NAME}:latest"

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "IMAGE_VERSION=$IMAGE_VERSION" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST=$IMAGE_LATEST" >> "$GITHUB_ENV"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image_version=$IMAGE_VERSION" >> "$GITHUB_OUTPUT"

      # Step 9: Run SonarQube analysis on the application source code
      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.sources=.
            -Dsonar.python.version=3.9
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.qualitygate.wait=false
            -Dsonar.qualitygate.timeout=300

      # Step 10: Build the Docker image with both versioned and latest tags
      - name: Build Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker build . \
            -t "${IMAGE_VERSION}" \
            -t "${IMAGE_LATEST}"

      # Step 11: Scan the built image for high and critical vulnerabilities
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_VERSION }}
          format: table
          exit-code: '1'                     # Fail pipeline on issues
          ignore-unfixed: true
          severity: CRITICAL,HIGH            # Only block on serious issues

      # Step 12: Push the immutable versioned image after checks succeed
      - name: Push versioned Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker push "${IMAGE_VERSION}"

      # Step 13: Push the latest tag for convenience and manual testing
      - name: Push latest Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker push "${IMAGE_LATEST}"

  deploy:
    runs-on: ubuntu-latest  # Separate runner for deployment-related GitOps changes
    needs: build            # Only deploy after the build job succeeds

    # Values used only by the deploy job
    env:
      GITOPS_REPO: ${{ vars.ARGOCD_REPO }}
      GITOPS_BRANCH: ${{ vars.ARGOCD_BRANCH }}
      GITOPS_MANIFEST_PATH: ${{ vars.ARGOCD_MANIFEST_PATH }}
      IMAGE_VERSION: ${{ needs.build.outputs.image_version }}
      VERSION: ${{ needs.build.outputs.version }}

    steps:

      # Step 14: Checkout the GitOps repository watched by ArgoCD
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          ref: ${{ env.GITOPS_BRANCH }}
          token: ${{ secrets.ARGOCD_REPO_TOKEN }}
          path: gitops

      # Step 15: Ensure the target Kubernetes manifest exists before editing it
      - name: Validate GitOps manifest path exists
        shell: bash
        run: |
          set -euo pipefail
          test -f "gitops/${GITOPS_MANIFEST_PATH}"

      # Step 16: Show the current image value for visibility before changing it
      - name: Show current image in GitOps manifest
        shell: bash
        run: |
          set -euo pipefail
          grep "image:" "gitops/${GITOPS_MANIFEST_PATH}"


      - name: Debug received values
        run: |
          echo "VERSION=${VERSION}"
          echo "IMAGE_VERSION=${IMAGE_VERSION}"


      # Step 17: Update the Kubernetes manifest to the newly built image tag
      - name: Update GitOps manifest image tag
        shell: bash
        run: |
          set -euo pipefail

          # Replace the current image line with the image produced by the build job
          sed -i "s|image: .*|image: ${IMAGE_VERSION}|g" \
            "gitops/${GITOPS_MANIFEST_PATH}"

          # Print the updated line to confirm the manifest change
          echo "Updated manifest:"
          grep "image:" "gitops/${GITOPS_MANIFEST_PATH}"

      # Step 18: Commit the manifest update into the GitOps repository
      - name: Commit GitOps manifest change
        shell: bash
        run: |
          set -euo pipefail
          cd gitops

          # Configure the Git identity used by the workflow
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${GITOPS_MANIFEST_PATH}"

          # Exit cleanly if the manifest already contains the target image
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "Update demo-app image tag to ${VERSION}"

      # Step 19: Push the GitOps commit so ArgoCD can detect and apply it
      - name: Push GitOps manifest change
        shell: bash
        run: |
          set -euo pipefail
          cd gitops
          git push origin "${GITOPS_BRANCH}"
