name: CI Build Scan and Update GitOps

on:
  push:
    branches:
      - master              # Trigger pipeline when code is pushed to master
  workflow_dispatch:        # Allow manual trigger from GitHub UI

permissions:
  contents: write           # Needed to push changes to GitOps repo

# Prevent multiple runs from conflicting when pushing rapidly
concurrency:
  group: demo-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-scan-update-gitops:
    runs-on: ubuntu-latest  # GitHub-hosted runner

    # Environment variables used across the workflow
    env:
      IMAGE_VERSION: ""  # Will be set dynamically during the workflow
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/demo-app
      GITOPS_REPO: ${{ vars.ARGOCD_REPO }}
      GITOPS_BRANCH: ${{ vars.ARGOCD_BRANCH }}
      GITOPS_MANIFEST_PATH: ${{ vars.ARGOCD_MANIFEST_PATH }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}

    steps:

      # Step 1: Checkout application source code
      - name: Checkout application repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Full history needed for SonarQube analysis

      # Step 2: Set up Python runtime environment
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'      # Enables pip dependency caching for faster builds

      # Step 3: Enable Docker Buildx (for advanced builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Install project dependencies
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov

      # Step 5: Run linting (code quality checks)
      - name: Run lint checks
        shell: bash
        run: |
          set -euo pipefail
          flake8 --ignore=E501,F401 .   

      # Step 6: Run unit tests
      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          if find . -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            pytest -q
          else
            echo "No test files found, skipping unit tests for now."
          fi

      # Step 7: Authenticate to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 8: Generate version tags for Docker image
      - name: Create image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="v${SHORT_SHA}-${GITHUB_RUN_NUMBER}"

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"

          # Full image tags
          echo "IMAGE_VERSION=${IMAGE_NAME}:${VERSION}" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST=${IMAGE_NAME}:latest" >> "$GITHUB_ENV"

      # Step 9: Run SonarQube analysis and wait for quality gate
      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.sources=.
            -Dsonar.python.version=3.9
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.qualitygate.wait=false
            -Dsonar.qualitygate.timeout=300

      # Step 10: Build Docker image with version and latest tags
      - name: Build Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker build . \
            -t "${IMAGE_VERSION}" \
            -t "${IMAGE_LATEST}"

      # Step 11: Scan Docker image for vulnerabilities (Trivy)
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_VERSION }}
          format: table
          exit-code: '1'                     # Fail pipeline on issues
          ignore-unfixed: true
          severity: CRITICAL,HIGH            # Only block on serious issues

      # Step 12: Push versioned image (only if scan passed)
      - name: Push versioned Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker push "${IMAGE_VERSION}"

      # Step 13: Push "latest" tag
      - name: Push latest Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker push "${IMAGE_LATEST}"

      # Step 14: Checkout GitOps repository (separate repo watched by ArgoCD)
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          ref: ${{ env.GITOPS_BRANCH }}
          token: ${{ secrets.ARGOCD_REPO_TOKEN }}
          path: gitops

      # Step 15: Ensure manifest file exists before modifying
      - name: Validate GitOps manifest path exists
        shell: bash
        run: |
          set -euo pipefail
          test -f "gitops/${GITOPS_MANIFEST_PATH}"

      # Step 16: Show current deployed image in manifest (for debugging/visibility)
      - name: Show current image in GitOps manifest
        shell: bash
        run: |
          set -euo pipefail
          grep "image:" "gitops/${GITOPS_MANIFEST_PATH}"

      # Step 17: Update image tag in Kubernetes manifest
      - name: Update GitOps manifest image tag
        shell: bash
        run: |
          set -euo pipefail

          # Replace existing image line with new version
          sed -i "s|image: .*|image: ${IMAGE_VERSION}|g" \
            "gitops/${GITOPS_MANIFEST_PATH}"

          # Verify change
          echo "Updated manifest:"
          grep "image:" "gitops/${GITOPS_MANIFEST_PATH}"

      # Step 18: Commit change to GitOps repo
      - name: Commit GitOps manifest change
        shell: bash
        run: |
          set -euo pipefail
          cd gitops

          # Configure Git identity
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${GITOPS_MANIFEST_PATH}"

          # Avoid failing if no changes
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "Update demo-app image tag to ${VERSION}"

      # Step 19: Push updated manifest (triggers ArgoCD deployment)
      - name: Push GitOps manifest change
        shell: bash
        run: |
          set -euo pipefail
          cd gitops
          git push origin "${GITOPS_BRANCH}"