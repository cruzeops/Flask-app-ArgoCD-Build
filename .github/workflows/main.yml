name: Test and Build

on:
  push:
    branches: 
        - master
    paths:
      - '**.*'
      - 'Dockerfile'
      
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VERSION: ""
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/demo-app
      GITOPS_REPO: ${{ vars.ARGOCD_REPO  }}
      GITOPS_BRANCH: ${{ vars.ARGOCD_BRANCH }}
      GITOPS_MANIFEST_PATH: ${{ vars.ARGOCD_MANIFEST_PATH }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}

    steps:
    # checkout the code, set up Python, install dependencies, run tests, and build the Docker image
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
    # Set up Python 3.8, and Docker Buildx for building the Docker image
      - name: Set up Python 3.9
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
        
      - name: Docker Setup
        uses: docker/setup-buildx-action@v2

    # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

    # Test the code
      - name: Run Linting tests
        run: |
          flake8 --ignore=E501,F401 .
    
      - name: Docker Credentials
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

    # Create a Docker tag with date and time for versioning
      - name: Create Docker tag
        id: version
        run: |
          VERSION=v$(date +'%m%d%H%M%S')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
    
    # SonarQube scan the code, and fail the build if the quality gate fails
      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.sources=.
            -Dsonar.python.version=3.9
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
          
    # Build the Docker image
      - name: Build Docker image
        run: |
          docker build . -t ${{ env.IMAGE_NAME }}:${{ env.VERSION }}

    # Push the docker image to Docker Hub with both the version tag and the latest tag      
      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.VERSION }}

    # Scan the Docker image for vulnerabilities using Trivy, and fail the build if any CRITICAL or HIGH severity vulnerabilities are found
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.VERSION }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

    # Checkout the separate GitOps repository that ArgoCD watches
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          ref: ${{ env.GITOPS_BRANCH }}
          token: ${{ secrets.ARGOCD_REPO_TOKEN }}
          path: gitops

    # List the contents of the GitOps repository and the manifest file before updating it
      - name: List GitOps repo contents before update
        run: |
            ls -la gitops
            cat gitops/${{ env.GITOPS_MANIFEST_PATH }}

    # Update the Kubernetes manifest in the GitOps repository
      - name: Update GitOps manifest
        run: |
          sed -i "s|image: .*|image: ${{ env.IMAGE_NAME }}:${{ env.VERSION }}|g" "gitops/${{ env.GITOPS_MANIFEST_PATH }}"
          grep "image:" "gitops/${{ env.GITOPS_MANIFEST_PATH }}"

    # List the contents of the GitOps repository and the manifest file after updating it
      - name: List GitOps repo contents after update
        run: |
            ls -la gitops
            cat gitops/${{ env.GITOPS_MANIFEST_PATH }}

    # Commit and push the manifest change to the GitOps repository
      - name: Commit updated GitOps manifest
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          cd gitops
          git add "${{ env.GITOPS_MANIFEST_PATH }}"
          git commit -m "Update demo-app image tag to ${{ env.VERSION }}" || echo "No changes to commit"

      - name: Push updated GitOps manifest
        run: |
          cd gitops
          git push origin "${{ env.GITOPS_BRANCH }}"
